# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    invalid_annotation_target: ignore  # required for freezed
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    - always_declare_return_types
    - avoid_dynamic_calls
    - avoid_print
    - avoid_unused_constructor_parameters
    - cancel_subscriptions
    - close_sinks
    # - directives_ordering
    #   Deferred: produces 4 issues in test/ files (import-order in
    #   app_router_test.dart, app_color_schemes_test.dart, widget_test.dart).
    #   Fix in a follow-up lint-hardening pass scoped to test/ — typically
    #   `dart fix --apply` resolves all four. Re-enable this rule once fixed.
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - prefer_final_in_for_each
    - prefer_final_locals
    - require_trailing_commas
    # - sort_pub_dependencies
    #   Deferred: `flutter pub add` appends new packages to the bottom of
    #   `dependencies:` / `dev_dependencies:` without re-sorting, and §2.3
    #   forbids hand-editing pubspec.yaml. Fix in a follow-up by running
    #   `dart pub add` invocations in the canonical sort order, or scoping
    #   a one-off pubspec sort to a dedicated task.
    - unnecessary_lambdas
    - unnecessary_late
    - unnecessary_null_aware_assignments
    - use_build_context_synchronously
    - use_super_parameters

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
